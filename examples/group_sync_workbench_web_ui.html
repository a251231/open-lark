<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Group Sync Workbench</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --bg-1: #0b1f2a;
      --bg-2: #10313e;
      --bg-3: #f5f7fa;
      --card: #ffffff;
      --text: #10212b;
      --muted: #5b6b75;
      --brand: #0f8b8d;
      --brand-2: #f29e4c;
      --danger: #c0392b;
      --ok: #2e7d32;
      --line: #d7dee3;
      --mono: "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Noto Sans SC", sans-serif;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(242, 158, 76, 0.2), transparent 60%),
        radial-gradient(1200px 700px at 110% 10%, rgba(15, 139, 141, 0.22), transparent 60%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 28%, var(--bg-3) 28%, var(--bg-3) 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1320px, 94vw);
      margin: 0 auto 28px;
    }

    .hero {
      padding: 28px 0 18px;
      color: #eff7fb;
      animation: fade-up 520ms ease-out;
    }

    .hero h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(26px, 3.1vw, 40px);
      letter-spacing: 0.4px;
      line-height: 1.1;
    }

    .hero p {
      margin: 10px 0 0;
      color: #c8dde8;
    }

    .status-chip {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      font-size: 12px;
      color: #e9f7ff;
      background: rgba(255, 255, 255, 0.08);
      font-family: var(--mono);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.22fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 26px rgba(16, 33, 43, 0.06);
      animation: fade-up 620ms ease both;
    }

    .card h2 {
      margin: 0 0 12px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      letter-spacing: 0.3px;
    }

    .card h3 {
      margin: 14px 0 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    input:focus,
    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 139, 141, 0.12);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(130deg, var(--brand) 0%, #15a7aa 100%);
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 139, 141, 0.25);
    }

    button.secondary {
      background: linear-gradient(130deg, #3b5564 0%, #4d6f82 100%);
    }

    button.warm {
      background: linear-gradient(130deg, #e08b35 0%, var(--brand-2) 100%);
    }

    button.danger {
      background: linear-gradient(130deg, #af2e22 0%, var(--danger) 100%);
    }

    .flags {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin: 8px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .flags input {
      margin-right: 5px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #edf1f4;
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f5f8fb;
      color: #445661;
      font-size: 12px;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .mono {
      font-family: var(--mono);
      font-size: 12px;
      word-break: break-all;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .log {
      min-height: 160px;
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #f9fcfd;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .ok { color: var(--ok); }
    .warn { color: #b37500; }
    .err { color: var(--danger); }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1080px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .row,
      .row-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <h1>Group Sync Workbench</h1>
      <p>群聊消息抓取、图片 OCR、Bitable 同步、发送与定时发送一体化操作台</p>
      <div id="healthChip" class="status-chip">健康检查中...</div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>消息与同步</h2>
        <div class="field">
          <label>Chat ID（留空时使用 OPENLARK_DEFAULT_CHAT_ID）</label>
          <input id="chatId" type="text" placeholder="oc_xxx" />
        </div>
        <div class="row-3">
          <div class="field">
            <label>Page Size</label>
            <input id="pageSize" type="number" value="20" min="1" max="50" />
          </div>
          <div class="field">
            <label>Max Pages</label>
            <input id="maxPages" type="number" value="1" min="1" max="100" />
          </div>
          <div class="field">
            <label>Start Time（秒时间戳，可空）</label>
            <input id="startTime" type="text" placeholder="1710000000" />
          </div>
        </div>
        <div class="field">
          <label>End Time（秒时间戳，可空）</label>
          <input id="endTime" type="text" placeholder="1719999999" />
        </div>

        <div class="flags">
          <label><input id="skipOcr" type="checkbox" />跳过 OCR</label>
          <label><input id="fullSync" type="checkbox" />全量重刷（忽略去重状态）</label>
        </div>

        <div class="actions">
          <button id="btnChatInfo" class="secondary">群信息</button>
          <button id="btnPull">拉取消息</button>
          <button id="btnSync" class="warm">同步到 Bitable</button>
        </div>

        <h3>消息列表</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>message_id</th>
                <th>type</th>
                <th>sender</th>
                <th>time</th>
                <th>text</th>
                <th>image_key</th>
                <th>file_key</th>
                <th>ocr_text</th>
              </tr>
            </thead>
            <tbody id="messageRows">
              <tr><td colspan="8" class="small">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>发送与调度</h2>
        <h3>发送文本消息</h3>
        <div class="field">
          <textarea id="sendText" placeholder="输入要发送的文本"></textarea>
        </div>
        <div class="actions">
          <button id="btnSendText">发送文本</button>
        </div>

        <h3>发送图片消息</h3>
        <div class="field">
          <input id="sendImageKey" type="text" placeholder="img_v2_xxx" />
        </div>
        <div class="actions">
          <button id="btnSendImage">发送图片</button>
        </div>

        <h3>定时发送文本</h3>
        <div class="field">
          <textarea id="scheduleText" placeholder="输入要定时发送的文本"></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label>间隔秒数</label>
            <input id="scheduleTextInterval" type="number" value="60" min="1" />
          </div>
          <div class="field">
            <label>执行次数（0=无限）</label>
            <input id="scheduleTextMaxRuns" type="number" value="0" min="0" />
          </div>
        </div>
        <div class="actions">
          <button id="btnScheduleText" class="warm">创建文本定时任务</button>
        </div>

        <h3>定时发送图片</h3>
        <div class="field">
          <input id="scheduleImageKey" type="text" placeholder="img_v2_xxx" />
        </div>
        <div class="row">
          <div class="field">
            <label>间隔秒数</label>
            <input id="scheduleImageInterval" type="number" value="60" min="1" />
          </div>
          <div class="field">
            <label>执行次数（0=无限）</label>
            <input id="scheduleImageMaxRuns" type="number" value="0" min="0" />
          </div>
        </div>
        <div class="actions">
          <button id="btnScheduleImage" class="warm">创建图片定时任务</button>
          <button id="btnRefreshSchedules" class="secondary">刷新任务列表</button>
        </div>

        <h3>增量状态管理</h3>
        <div class="actions">
          <button id="btnState" class="secondary">查看同步状态</button>
          <button id="btnStateAll" class="secondary">查看全部群状态</button>
          <button id="btnClearState" class="danger">清理当前群状态</button>
          <button id="btnClearAllState" class="danger">清理全部状态</button>
        </div>

        <h3>定时任务列表</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>id</th>
                <th>kind</th>
                <th>chat</th>
                <th>interval</th>
                <th>max_runs</th>
                <th>sent</th>
                <th>status</th>
                <th>error</th>
                <th>action</th>
              </tr>
            </thead>
            <tbody id="scheduleRows">
              <tr><td colspan="9" class="small">暂无任务</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <section class="card" style="margin-top:16px">
      <h2>操作日志</h2>
      <div class="log" id="logPanel">准备就绪</div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const logPanel = $("logPanel");

    function now() {
      return new Date().toLocaleString();
    }

    function logLine(text, level = "ok") {
      const line = `[${now()}] ${text}`;
      const span = document.createElement("div");
      span.className = level;
      span.textContent = line;
      logPanel.appendChild(span);
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function chatPayload() {
      const chat = $("chatId").value.trim();
      return chat ? { chat_id: chat } : {};
    }

    function parseNum(id, fallback) {
      const raw = $(id).value.trim();
      if (!raw) return fallback;
      const num = Number(raw);
      return Number.isFinite(num) ? num : fallback;
    }

    function optionalText(id) {
      const raw = $(id).value.trim();
      return raw || undefined;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function requestJson(url, method = "POST", payload = undefined) {
      const options = {
        method,
        headers: { "Content-Type": "application/json" }
      };
      if (payload !== undefined && method !== "GET") {
        options.body = JSON.stringify(payload);
      }

      const res = await fetch(url, options);
      let body = null;
      try {
        body = await res.json();
      } catch (_) {
        throw new Error(`请求失败：${res.status}`);
      }

      if (!res.ok || !body.ok) {
        throw new Error(body?.message || `请求失败：${res.status}`);
      }
      return body.data;
    }

    function renderMessages(items) {
      const rows = $("messageRows");
      if (!Array.isArray(items) || items.length === 0) {
        rows.innerHTML = `<tr><td colspan="8" class="small">暂无消息</td></tr>`;
        return;
      }

      rows.innerHTML = items.map((it) => `
        <tr>
          <td class="mono">${escapeHtml(it.message_id)}</td>
          <td>${escapeHtml(it.msg_type)}</td>
          <td class="mono">${escapeHtml(it.sender_id)}</td>
          <td class="mono">${escapeHtml(it.create_time)}</td>
          <td>${escapeHtml(it.text)}</td>
          <td class="mono">${escapeHtml(it.image_key)}</td>
          <td class="mono">${escapeHtml(it.file_key)}</td>
          <td>${escapeHtml(it.ocr_text)}</td>
        </tr>
      `).join("");
    }

    function renderSchedules(items) {
      const rows = $("scheduleRows");
      if (!Array.isArray(items) || items.length === 0) {
        rows.innerHTML = `<tr><td colspan="9" class="small">暂无任务</td></tr>`;
        return;
      }

      rows.innerHTML = items.map((it) => `
        <tr>
          <td class="mono">${escapeHtml(it.id)}</td>
          <td>${escapeHtml(it.kind)}</td>
          <td class="mono">${escapeHtml(it.chat_id)}</td>
          <td>${escapeHtml(it.interval_secs)}s</td>
          <td>${escapeHtml(it.max_runs)}</td>
          <td>${escapeHtml(it.sent)}</td>
          <td>${escapeHtml(it.status)}</td>
          <td>${escapeHtml(it.last_error || "")}</td>
          <td>
            <button class="danger" onclick="stopSchedule('${escapeHtml(it.id)}')">停止</button>
          </td>
        </tr>
      `).join("");
    }

    async function healthCheck() {
      try {
        const data = await requestJson("/api/health", "GET");
        const msg = `状态: ${data.status} | 默认群: ${data.default_chat_id || "未设置"} | Bitable: ${data.bitable_configured ? "已配置" : "未配置"} | OCR: ${data.ocr_configured ? "已配置" : "未配置"}`;
        $("healthChip").textContent = msg;
        logLine("健康检查通过");
      } catch (err) {
        $("healthChip").textContent = `健康检查失败: ${err.message}`;
        logLine(`健康检查失败: ${err.message}`, "err");
      }
    }

    async function loadChatInfo() {
      try {
        const data = await requestJson("/api/chat/info", "POST", chatPayload());
        logLine(`群信息加载成功: ${JSON.stringify(data).slice(0, 180)}...`);
      } catch (err) {
        logLine(`群信息加载失败: ${err.message}`, "err");
      }
    }

    async function pullMessages() {
      try {
        const payload = {
          ...chatPayload(),
          page_size: parseNum("pageSize", 20),
          max_pages: parseNum("maxPages", 1),
          start_time: optionalText("startTime"),
          end_time: optionalText("endTime")
        };
        const data = await requestJson("/api/messages/pull", "POST", payload);
        renderMessages(data.items || []);
        logLine(`拉取消息成功: count=${data.count}`);
      } catch (err) {
        logLine(`拉取消息失败: ${err.message}`, "err");
      }
    }

    async function syncMessages() {
      try {
        const payload = {
          ...chatPayload(),
          page_size: parseNum("pageSize", 20),
          max_pages: parseNum("maxPages", 1),
          start_time: optionalText("startTime"),
          end_time: optionalText("endTime"),
          skip_ocr: $("skipOcr").checked,
          full_sync: $("fullSync").checked
        };
        const data = await requestJson("/api/messages/sync", "POST", payload);
        const s = data.summary || {};
        logLine(`同步完成: success=${s.success}, failed=${s.failed}, skipped=${s.skipped_existing}, full_sync=${s.full_sync}`);
        await loadStateCurrent();
      } catch (err) {
        logLine(`同步失败: ${err.message}`, "err");
      }
    }

    async function sendText() {
      try {
        const text = $("sendText").value.trim();
        if (!text) {
          logLine("文本为空，未发送", "warn");
          return;
        }
        await requestJson("/api/send/text", "POST", { ...chatPayload(), text });
        logLine("文本消息发送成功");
      } catch (err) {
        logLine(`文本消息发送失败: ${err.message}`, "err");
      }
    }

    async function sendImage() {
      try {
        const image_key = $("sendImageKey").value.trim();
        if (!image_key) {
          logLine("image_key 为空，未发送", "warn");
          return;
        }
        await requestJson("/api/send/image", "POST", { ...chatPayload(), image_key });
        logLine("图片消息发送成功");
      } catch (err) {
        logLine(`图片消息发送失败: ${err.message}`, "err");
      }
    }

    async function createTextSchedule() {
      try {
        const text = $("scheduleText").value.trim();
        if (!text) {
          logLine("定时文本为空，未创建任务", "warn");
          return;
        }
        const payload = {
          ...chatPayload(),
          text,
          interval_secs: parseNum("scheduleTextInterval", 60),
          max_runs: parseNum("scheduleTextMaxRuns", 0)
        };
        const data = await requestJson("/api/schedule/text", "POST", payload);
        logLine(`文本定时任务已创建: id=${data.id}`);
        await refreshSchedules();
      } catch (err) {
        logLine(`创建文本定时任务失败: ${err.message}`, "err");
      }
    }

    async function createImageSchedule() {
      try {
        const image_key = $("scheduleImageKey").value.trim();
        if (!image_key) {
          logLine("定时图片 image_key 为空，未创建任务", "warn");
          return;
        }
        const payload = {
          ...chatPayload(),
          image_key,
          interval_secs: parseNum("scheduleImageInterval", 60),
          max_runs: parseNum("scheduleImageMaxRuns", 0)
        };
        const data = await requestJson("/api/schedule/image", "POST", payload);
        logLine(`图片定时任务已创建: id=${data.id}`);
        await refreshSchedules();
      } catch (err) {
        logLine(`创建图片定时任务失败: ${err.message}`, "err");
      }
    }

    async function refreshSchedules() {
      try {
        const data = await requestJson("/api/schedules", "GET");
        renderSchedules(data.items || []);
      } catch (err) {
        logLine(`刷新任务列表失败: ${err.message}`, "err");
      }
    }

    async function stopSchedule(id) {
      try {
        await requestJson(`/api/schedules/${encodeURIComponent(id)}/stop`, "POST", {});
        logLine(`停止任务指令已发送: ${id}`);
        await refreshSchedules();
      } catch (err) {
        logLine(`停止任务失败: ${err.message}`, "err");
      }
    }
    window.stopSchedule = stopSchedule;

    function formatStateResult(data) {
      const items = Array.isArray(data.items) ? data.items : [];
      const lines = [
        `sync_state_file=${data.sync_state_file}`,
        `chat_count=${data.chat_count}`
      ];
      for (const it of items) {
        lines.push(`chat_id=${it.chat_id}, synced_message_count=${it.synced_message_count}`);
      }
      return lines.join(" | ");
    }

    async function loadStateCurrent() {
      try {
        const data = await requestJson("/api/state", "POST", chatPayload());
        logLine(`当前群同步状态: ${formatStateResult(data)}`);
      } catch (err) {
        logLine(`获取当前群同步状态失败: ${err.message}`, "err");
      }
    }

    async function loadStateAll() {
      try {
        const data = await requestJson("/api/state", "POST", {});
        logLine(`全部同步状态: ${formatStateResult(data)}`);
      } catch (err) {
        logLine(`获取全部同步状态失败: ${err.message}`, "err");
      }
    }

    async function clearStateCurrent() {
      try {
        await requestJson("/api/state/clear", "POST", { ...chatPayload(), all: false });
        logLine("已清理当前群同步状态");
        await loadStateCurrent();
      } catch (err) {
        logLine(`清理当前群状态失败: ${err.message}`, "err");
      }
    }

    async function clearStateAll() {
      try {
        await requestJson("/api/state/clear", "POST", { all: true });
        logLine("已清理全部同步状态");
      } catch (err) {
        logLine(`清理全部状态失败: ${err.message}`, "err");
      }
    }

    function bindEvents() {
      $("btnChatInfo").addEventListener("click", loadChatInfo);
      $("btnPull").addEventListener("click", pullMessages);
      $("btnSync").addEventListener("click", syncMessages);
      $("btnSendText").addEventListener("click", sendText);
      $("btnSendImage").addEventListener("click", sendImage);
      $("btnScheduleText").addEventListener("click", createTextSchedule);
      $("btnScheduleImage").addEventListener("click", createImageSchedule);
      $("btnRefreshSchedules").addEventListener("click", refreshSchedules);
      $("btnState").addEventListener("click", loadStateCurrent);
      $("btnStateAll").addEventListener("click", loadStateAll);
      $("btnClearState").addEventListener("click", clearStateCurrent);
      $("btnClearAllState").addEventListener("click", clearStateAll);
    }

    async function bootstrap() {
      bindEvents();
      await healthCheck();
      await refreshSchedules();
      setInterval(refreshSchedules, 10000);
    }

    bootstrap();
  </script>
</body>
</html>
